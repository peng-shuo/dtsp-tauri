name: Build aarch64
on:
  workflow_dispatch: # 允许手动触发
  push:
    branches:
      - master # 推送到 master 分支时触发

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support

      - name: Setup multiarch Docker
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build using Native arm64 Container (via QEMU)
        run: |
          # 创建一个基于原生的 ARM64 系统的 Dockerfile
          # 这能彻底避开交叉编译时的 apt 依赖树冲突问题
          cat << 'EOF' > Dockerfile.arm64
          FROM --platform=linux/arm64 rust:bookworm

          ENV DEBIAN_FRONTEND=noninteractive

          # 在原生的 arm64 系统中，直接安装常规依赖即可，无需指定 :arm64 后缀
          RUN apt-get update && \
              apt-get install -y --no-install-recommends \
                  curl \
                  wget \
                  file \
                  build-essential \
                  pkg-config \
                  libssl-dev \
                  libglib2.0-dev \
                  libgtk-3-dev \
                  libwebkit2gtk-4.1-dev \
                  libayatana-appindicator3-dev \
                  librsvg2-dev \
                  javascriptcoregtk-4.1 \
                  libsoup-3.0-dev

          # 安装 WebAssembly 目标用于前端 Trunk 构建
          RUN rustup target add wasm32-unknown-unknown

          # 安装 Trunk 和 Tauri CLI (使用 cargo-binstall 加速)
          RUN curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash && \
              cargo binstall -y trunk tauri-cli

          WORKDIR /workspace
          EOF

          # 使用 QEMU 构建原生 arm64 镜像
          docker build --platform linux/arm64 -t tauri-native-arm64 -f Dockerfile.arm64 .

          # 运行 arm64 容器并在内部进行标准打包（不需要指定 target，因为系统本身就是 arm64）
          docker run --rm --platform linux/arm64 -v ${{ github.workspace }}:/workspace tauri-native-arm64 bash -c "\
            cargo tauri build --bundles deb"

      - name: Upload aarch64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: aarch64-deb-package
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error