name: Build aarch64
on:
  workflow_dispatch: # 允许手动触发
  push:
    branches:
      - master # 推送到 master 分支时触发

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support

      - name: Setup multiarch Docker
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build using Docker cross-compilation
        run: |
          # 创建一个 Dockerfile，使用 amd64 宿主机并安装 aarch64 交叉编译工具链和依赖
          cat << 'EOF' > Dockerfile.cross
          FROM rust:bookworm

          ENV DEBIAN_FRONTEND=noninteractive

          # 更新源列表并安装依赖
          # 注意：在 Debian bookworm 中 javascriptcoregtk 被包含在 libwebkit2gtk 的相关包中，或者名为 libjavascriptcoregtk-4.1-dev，
          # 但跨架构安装有时候 apt 会遇到依赖冲突。如果 webkit2gtk 装了通常就包含了。
          RUN dpkg --add-architecture arm64 && \
              apt-get update && \
              apt-get install -y --no-install-recommends \
                  curl \
                  wget \
                  file \
                  build-essential \
                  gcc-aarch64-linux-gnu \
                  g++-aarch64-linux-gnu \
                  pkg-config \
                  libssl-dev \
                  libglib2.0-dev:arm64 \
                  libgtk-3-dev:arm64 \
                  libsoup-3.0-dev:arm64 \
                  libwebkit2gtk-4.1-dev:arm64 \
                  libayatana-appindicator3-dev:arm64 \
                  librsvg2-dev:arm64

          # 安装 WebAssembly 目标用于前端 Trunk 构建
          RUN rustup target add wasm32-unknown-unknown
          
          # 安装 aarch64 目标用于后端 Tauri 构建
          RUN rustup target add aarch64-unknown-linux-gnu

          # 安装 Trunk 和 Tauri CLI (使用 cargo-binstall 加速)
          RUN curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash && \
              cargo binstall -y trunk tauri-cli

          # 设置交叉编译环境变量
          ENV PKG_CONFIG_SYSROOT_DIR=/
          ENV PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig
          ENV PKG_CONFIG_ALLOW_CROSS=1
          ENV CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          ENV CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc
          ENV CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++

          WORKDIR /workspace
          EOF

          # 构建 Docker 镜像
          docker build -t tauri-cross-aarch64 -f Dockerfile.cross .

          # 运行容器，在容器内执行打包
          docker run --rm -v ${{ github.workspace }}:/workspace tauri-cross-aarch64 bash -c "\
            cargo tauri build --target aarch64-unknown-linux-gnu --bundles deb"

      - name: Upload aarch64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: aarch64-deb-package
          path: src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/*.deb
          if-no-files-found: error