name: Build aarch64
on:
  workflow_dispatch: # 允许手动触发
  push:
    branches:
      - master # 推送到 master 分支时触发

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build using Docker cross-compilation with Cache
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .github/Dockerfile.aarch64
          platforms: linux/arm64
          load: true # 将构建好的镜像加载回本地 Docker
          tags: tauri-native-arm64:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/build-cache:aarch64
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/build-cache:aarch64,mode=max
          github-token: ${{ secrets.GITHUB_TOKEN }} # 用于读写 GHCR 缓存

      - name: Extract DEB artifact from container
        run: |
          # 1. 运行刚刚构建好并包含了编译产物的镜像
          docker create --name extract_container tauri-native-arm64:latest
          
          # 2. 将容器内的编译产物拷贝到宿主机
          # 注意：因为我们是把整个代码放进去编译的，产物在容器的 /workspace/src-tauri/target 下
          mkdir -p ./dist_deb
          docker cp extract_container:/workspace/src-tauri/target/ ./target_dump
          
          # 3. 寻找 deb 包并拷贝到明确的文件夹
          find ./target_dump -name "*.deb" -exec cp {} ./dist_deb/ \;
          
          # 4. 清理容器
          docker rm extract_container

      - name: Upload aarch64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: aarch64-deb-package
          path: ./dist_deb/*.deb
          if-no-files-found: error